name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build against (e.g., v0.7.0)"
        required: true
        type: string

# Permissions to create releases
permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Verify Cargo.toml version
        run: |
          if ! grep -q "version = \"$VERSION\"" Cargo.toml; then
            echo "Cargo.toml version does not match tag $VERSION" >&2
            exit 1
          fi
      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --draft --title "$GITHUB_REF_NAME" --notes "Release $VERSION of jsongrep"

  publish-crates:
    name: Publish to crates.io
    needs: create-release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-release:
    name: Build Release Binaries
    needs: create-release
    if: always() && (needs.create-release.result == 'success' || needs.create-release.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            ext: ""
            strip: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            ext: ""
            strip: true
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
            strip: true
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            strip: true
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            strip: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          target: ${{ matrix.target }}
      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu qemu-user-static
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
          echo "CC_aarch64_unknown_linux_musl=aarch64-linux-gnu-gcc" >> $GITHUB_ENV
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Strip binary (Unix)
        if: matrix.strip && !matrix.cross
        run: strip "target/${{ matrix.target }}/release/jg${{ matrix.ext }}"
      - name: Strip binary (Cross-compiled)
        if: matrix.strip && matrix.cross
        run: aarch64-linux-gnu-strip "target/${{ matrix.target }}/release/jg${{ matrix.ext }}"
      - name: Generate man pages and shell completions
        shell: bash
        run: |
          binary="target/${{ matrix.target }}/release/jg${{ matrix.ext }}"
          mkdir -p completions man
          "$binary" generate man --output-dir man
          for sh in bash fish zsh; do
            "$binary" generate shell "$sh" > "completions/jg.$sh"
          done
      - name: Create archive
        if: matrix.os != 'windows-latest'
        run: |
          version="${{ env.RELEASE_TAG }}"
          archive="jsongrep-${version#v}-${{ matrix.target }}"
          mkdir -p "$archive"
          cp "target/${{ matrix.target }}/release/jg${{ matrix.ext }}" "$archive/jg${{ matrix.ext }}"
          cp README.md LICENSE "$archive/"
          cp -r man completions "$archive/"
          tar czf "$archive.tar.gz" "$archive"
          shasum -a 256 "$archive.tar.gz" > "$archive.tar.gz.sha256"
          echo "ASSET=$archive.tar.gz" >> $GITHUB_ENV
          echo "ASSET_SUM=$archive.tar.gz.sha256" >> $GITHUB_ENV
      - name: Create archive (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          version="${{ env.RELEASE_TAG }}"
          archive="jsongrep-${version#v}-${{ matrix.target }}"
          mkdir -p "$archive"
          cp "target/${{ matrix.target }}/release/jg${{ matrix.ext }}" "$archive/jg${{ matrix.ext }}"
          cp README.md LICENSE "$archive/"
          cp -r man completions "$archive/"
          7z a "$archive.zip" "$archive"
          certutil -hashfile "$archive.zip" SHA256 > "$archive.zip.sha256"
          echo "ASSET=$archive.zip" >> $GITHUB_ENV
          echo "ASSET_SUM=$archive.zip.sha256" >> $GITHUB_ENV
      - name: Upload release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ env.RELEASE_TAG }}" "$ASSET" "$ASSET_SUM" --clobber
